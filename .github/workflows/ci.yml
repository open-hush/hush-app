name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    name: typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      # TODO(phase-1): enable once `expo lint` is wired up.
      # - name: lint
      #   run: npm run lint
